<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Bootstrap</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light"> 

    <main class="container d-flex align-items-center justify-content-center vh-100">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">

                <div class="card shadow border-0 p-4">
                     <div class="card-body">

                      <div class="text-center mb-4">
                            <h2 class="fw-bold text-primary">Bem-vindo</h2>
                            <p class="text-secondary">Faça login para continuar</p>
                        </div>

                        <form>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">E-mail</label>
                                <input type="email" class="form-control" id="email" placeholder="IcaroB1234@gmail.com" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">Senha</label>
                                <input type="password" class="form-control" id="password" placeholder="@Icarolindo123" required>
                            </div>

                            <div class="text-end mb-3">
                                <a href="#" class="text-decoration-none small">Esqueceu a senha?</a>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                            </div>
                        </form>

</body>
</html>
