<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <main class="container d-flex align-items-center justify-content-center vh-100">

        <div class="row w-100 justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
            </div>

                <div class="card shadow border-0 p-4">
                    <div class="card-body">
                    </div>

                        <div class="text-center mb-4">
                            <h2 class="fw-bold text-primary">Bem vindo</h2>
                            <p class="text-secondary">Faça o login para continuar</p>
                        </div>

                        <form>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control" id="password" placeholder="Digite a senha" required>
                            </div>
                        </form>
            </div>
        </div>
    </main>
    
</body>
</html>
